# Local Supabase exists only to exercise the maintained SQL contract. The
# historical 001-005 files are upgrade artifacts and are intentionally not run
# as a sequential migration chain.
project_id = "bullet-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = false
schema_paths = []

# Keep a single source of truth: reset loads the fresh-install baseline and
# then the forward-only migrations directly from db/migrations.
[db.seed]
enabled = true
sql_paths = [
  "../db/migrations/000_current_schema.sql",
  "../db/migrations/006_incremental_sync_change_log.sql",
]

[realtime]
enabled = false

[studio]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[analytics]
enabled = false

[edge_runtime]
enabled = false
